apiVersion: v2
appVersion: 1.0.0
description: Devtron custom deployment chart that renders a Flux GitRepository + a
  tofu-controller Terraform CR, both pinned to the flux-system namespace, for the
  infra-iac-poc. One Devtron environment per target (dev, prod); each block overrides
  source.path (./dev | ./prod) so the matching terraform.tfvars in the IaC repo supplies
  the bucket-name override (dev-test / prod-test).
keywords:
- opentofu
- tofu-controller
- flux
- gitops
- devtron
maintainers:
- name: infra-iac-poc
name: dhanya-iac-poc
type: application
version: 1.0.1
