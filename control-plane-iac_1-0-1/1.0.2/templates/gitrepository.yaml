apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: {{ include "iac.sourceName" . }}
  # Pinned to flux-system regardless of the Devtron environment's namespace
  # (dev-ns / prod-ns) — this is where tofu-controller + tf-runner SA live.
  namespace: {{ .Values.targetNamespace }}
  labels:
    app.kubernetes.io/managed-by: devtron
    iac-block: {{ include "iac.name" . | quote }}
spec:
  interval: {{ .Values.source.interval }}
  url: {{ .Values.source.url | quote }}
  ref:
    branch: {{ .Values.source.ref | quote }}
  {{- if .Values.source.secretRef }}
  # Only needed for a PRIVATE repo. Secret must live in flux-system.
  secretRef:
    name: {{ .Values.source.secretRef | quote }}
  {{- end }}
